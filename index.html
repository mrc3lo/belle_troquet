<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page - Banda de Rock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <header>
        <img src="logo.png" alt="Logo de la banda" class="logo">
        <nav>
    <ul class="nav-icons">

        <li>
            <a href="https://www.instagram.com/belletroquet/"
               target="_blank">
                <i class="fa-brands fa-instagram"></i>
            </a>
        </li>

        <li>
            <a href="https://www.facebook.com/profile.php?id=61582759103744"
               target="_blank">
                <i class="fa-brands fa-facebook-f"></i>
            </a>
        </li>

        <li>
            <a href="#formulario">
                <i class="fa-solid fa-envelope"></i>
            </a>
        </li>

        <li>
            <a href="#mapa">
                <i class="fa-solid fa-earth-americas"></i>
            </a>
        </li>

    </ul>
</nav>
    </header>

    <main>
        <section class="banda">
            <img src="banda.jpg" alt="Foto de la banda" class="banda-foto">
        </section>

<!--        <section class="invitacion">
            <img src="invitacion.png" alt="Invitación al evento" class="invitacion-foto">
        </section>-->

        <section id="formulario" class="formulario">
            <h2>Confirma tu asistencia</h2>
            <form action="https://formspree.io/f/xojrrorr" method="post">
                <input type="hidden" name="_subject" value="Nueva confirmación Belle Troquet">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

    <button type="submit">Confirmar Asistencia</button>
</form>
        </section>

        <section id="mapa" class="mapa">
            <h2>Ubicación del Evento</h2>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3192.4996669721036!2d-73.05033292335412!3d-36.85445707982546!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9669b66741867f3d%3A0x7d837d465dde3f53!2zU2FuaHVlemEgMTgxNSwgNDA0MDQxOCBDb25jZXBjacOzbiwgQsOtbyBCw61v!5e0!3m2!1ses!2scl!4v1778608565500!5m2!1ses!2scl" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Boro Producciones. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
